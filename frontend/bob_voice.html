<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOB Voice — Monaco Agency</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e8e8e8; min-height: 100vh; }

/* Header */
.header { background: #161a24; border-bottom: 1px solid #2a2d3a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 10; }
.logo { font-size: 14px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
.logo span { background: #059669; color: #fff; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #2a2d3a; background: #1e2130; color: #c8c8c8; text-decoration: none; }

/* Main layout */
.container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

/* BOB Avatar */
.bob-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
.bob-avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #059669, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 52px; margin-bottom: 16px; box-shadow: 0 0 0 0 rgba(5,150,105,0.4); transition: box-shadow 0.3s; position: relative; cursor: pointer; }
.bob-avatar.ouvindo { animation: pulse 1.5s infinite; box-shadow: 0 0 0 20px rgba(5,150,105,0); }
.bob-avatar.falando { animation: pulse-blue 1.5s infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(5,150,105,0.7); }
  70% { box-shadow: 0 0 0 20px rgba(5,150,105,0); }
  100% { box-shadow: 0 0 0 0 rgba(5,150,105,0); }
}
@keyframes pulse-blue {
  0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); }
  70% { box-shadow: 0 0 0 20px rgba(59,130,246,0); }
  100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}
.bob-status { font-size: 13px; color: #6b7280; text-align: center; min-height: 20px; }
.bob-status.ativo { color: #34d399; }
.bob-status.falando { color: #60a5fa; }
.bob-status.processando { color: #fbbf24; }

/* Mic button */
.mic-btn { width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-top: 16px; transition: all 0.2s; background: #1e2130; border: 2px solid #2a2d3a; }
.mic-btn:hover { background: #262a3a; border-color: #059669; }
.mic-btn.ouvindo { background: #059669; border-color: #059669; animation: pulse 1.5s infinite; }
.mic-btn.processando { background: #fbbf24; border-color: #fbbf24; }

/* Transcript */
.transcript-box { background: #161a24; border: 1px solid #2a2d3a; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; min-height: 60px; font-size: 14px; color: #9ca3af; font-style: italic; }
.transcript-box.tem-texto { color: #e8e8e8; font-style: normal; }

/* Resposta BOB */
.resposta-box { background: #111318; border: 1px solid #2a2d3a; border-radius: 12px; padding: 20px; margin-bottom: 24px; min-height: 80px; font-size: 14px; line-height: 1.8; display: none; }
.resposta-box.show { display: block; }
.resposta-header { font-size: 11px; color: #059669; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* Comandos sugeridos */
.comandos-title { font-size: 12px; color: #4b5563; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
.comandos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; margin-bottom: 32px; }
.cmd-btn { background: #161a24; border: 1px solid #2a2d3a; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #9ca3af; cursor: pointer; text-align: left; transition: all .15s; line-height: 1.4; }
.cmd-btn:hover { background: #1a1e2a; border-color: #059669; color: #34d399; }
.cmd-btn .cmd-icon { font-size: 16px; display: block; margin-bottom: 4px; }

/* Historico */
.historico { margin-top: 24px; }
.historico-title { font-size: 12px; color: #4b5563; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
.msg { display: flex; gap: 10px; margin-bottom: 14px; }
.msg.user { flex-direction: row-reverse; }
.msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
.msg.user .msg-bubble { background: #1d4ed8; color: #fff; border-bottom-right-radius: 4px; }
.msg.bob .msg-bubble { background: #161a24; border: 1px solid #2a2d3a; color: #e8e8e8; border-bottom-left-radius: 4px; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.msg.bob .msg-avatar { background: linear-gradient(135deg, #059669, #3b82f6); }
.msg.user .msg-avatar { background: #1d4ed8; font-size: 12px; color: #fff; font-weight: 600; }

/* Loading dots */
.loading-dots { display: inline-flex; gap: 4px; }
.loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #6b7280; animation: bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.8); opacity: .5; } 40% { transform: scale(1); opacity: 1; } }

/* Config */
.config-bar { background: #161a24; border: 1px solid #2a2d3a; border-radius: 10px; padding: 14px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.config-bar label { font-size: 12px; color: #6b7280; white-space: nowrap; }
.config-bar input { background: #0f1117; border: 1px solid #2a2d3a; border-radius: 8px; padding: 7px 12px; font-size: 13px; color: #e8e8e8; outline: none; flex: 1; min-width: 200px; }
.tag-ok { background: rgba(52,211,153,.1); color: #34d399; font-size: 12px; padding: 4px 10px; border-radius: 6px; }
.btn-salvar { padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #3b82f6; background: #3b82f6; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🤖 BOB Voice <span>Monaco Agency</span></div>
  <a href="dashboard.html" class="back-btn">← Dashboard</a>
</div>

<div class="container">

  <!-- Config token -->
  <div class="config-bar" id="config-bar">
    <label>Anthropic API Key:</label>
    <input type="password" id="anthropic-key-input" placeholder="sk-ant-...">
    <button class="btn-salvar" onclick="salvarKeys()">Salvar</button>
  </div>

  <!-- BOB Avatar -->
  <div class="bob-section">
    <div class="bob-avatar" id="bob-avatar" onclick="toggleMic()">🤖</div>
    <div class="bob-status" id="bob-status">Clique no BOB ou no microfone para falar</div>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
  </div>

  <!-- Transcript -->
  <div class="transcript-box" id="transcript">Aguardando seu comando...</div>

  <!-- Resposta -->
  <div class="resposta-box" id="resposta-box">
    <div class="resposta-header">🤖 BOB responde</div>
    <div id="resposta-texto"></div>
  </div>

  <!-- Comandos sugeridos -->
  <div class="comandos-title">Comandos sugeridos — clique ou fale</div>
  <div class="comandos-grid">
    <button class="cmd-btn" onclick="executarComando('Relatório de desempenho geral dos últimos 7 dias')">
      <span class="cmd-icon">📊</span>Desempenho geral 7 dias
    </button>
    <button class="cmd-btn" onclick="executarComando('Quais campanhas estão críticas ou com ROAS baixo?')">
      <span class="cmd-icon">🚨</span>Campanhas críticas
    </button>
    <button class="cmd-btn" onclick="executarComando('Como está o saldo das contas de anúncio?')">
      <span class="cmd-icon">💰</span>Saldo das contas
    </button>
    <button class="cmd-btn" onclick="executarComando('Quais campanhas encerram em breve?')">
      <span class="cmd-icon">⏰</span>Encerramentos próximos
    </button>
    <button class="cmd-btn" onclick="executarComando('Relatório de desempenho dos últimos 30 dias')">
      <span class="cmd-icon">📅</span>Desempenho 30 dias
    </button>
    <button class="cmd-btn" onclick="executarComando('Quais são os top performers esta semana?')">
      <span class="cmd-icon">🏆</span>Top performers
    </button>
    <button class="cmd-btn" onclick="executarComando('Resumo de investimento e faturamento total')">
      <span class="cmd-icon">🛒</span>Investimento e faturamento
    </button>
    <button class="cmd-btn" onclick="executarComando('Qual o ROAS médio de todas as BMs?')">
      <span class="cmd-icon">🚀</span>ROAS médio geral
    </button>
  </div>

  <!-- Histórico -->
  <div class="historico">
    <div class="historico-title">Histórico da conversa</div>
    <div id="historico-msgs"></div>
  </div>

</div>

<script>
const TOKEN_KEY = 'monaco_meta_token';
const ANTHROPIC_KEY = 'monaco_anthropic_key';
const API_VERSION = 'v19.0';

let token = localStorage.getItem(TOKEN_KEY) || '';
let anthropicKey = localStorage.getItem(ANTHROPIC_KEY) || '';
let recognition = null;
let synth = window.speechSynthesis;
let ouvindo = false;
let processando = false;
let historico = [];

const CONTAS = [
  { nome: 'CA - ROSA SUL NOVA', id: 'act_2523170184768797' },
  { nome: 'Dia de Pizza - Dourados', id: 'act_723575425785405' },
  { nome: 'IH CAMPO GRANDE MS', id: 'act_1131240581799095' },
  { nome: 'Mollinari Pizzaria', id: 'act_459274303920372' },
  { nome: 'MrGabs', id: 'act_728296823243425' },
  { nome: 'IH DOURADOS', id: 'act_831936562721815' },
  { nome: 'Villa Grano Pizzaria', id: 'act_909424425271250' },
  { nome: 'Brados Pizzaria', id: 'act_972023765779926' },
  { nome: 'Berlim Pizzaria', id: 'act_836447545843342' },
  { nome: 'A FAVORITA', id: 'act_969681458906352' },
  { nome: 'CA - BRAVA PIZZA', id: 'act_4279801688941861' },
  { nome: 'Pavao Lanchonete', id: 'act_1759603645448352' },
  { nome: 'Fornalha Pizzaria', id: 'act_1618084519451450' },
];

const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtN = v => Number(v).toLocaleString('pt-BR');

// ── Salvar chaves ────────────────────────────────────────────────
function salvarKeys() {
  const ak = document.getElementById('anthropic-key-input').value.trim();
  if (ak) { localStorage.setItem(ANTHROPIC_KEY, ak); anthropicKey = ak; }
  document.getElementById('config-bar').innerHTML = '<span class="tag-ok">✓ Chaves salvas! BOB pronto para responder.</span>';
}

// Verificar se já tem chaves
if (anthropicKey) {
  document.getElementById('config-bar').innerHTML = '<span class="tag-ok">✓ Chaves configuradas. BOB pronto!</span>';
}

// ── Speech Recognition ────────────────────────────────────────────
function inicializarReconhecimento() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    setStatus('Seu navegador não suporta reconhecimento de voz. Use Chrome.', '');
    return null;
  }
  const rec = new SpeechRecognition();
  rec.lang = 'pt-BR';
  rec.continuous = false;
  rec.interimResults = true;

  rec.onstart = () => {
    ouvindo = true;
    setStatus('Ouvindo... fale agora!', 'ativo');
    document.getElementById('mic-btn').classList.add('ouvindo');
    document.getElementById('bob-avatar').classList.add('ouvindo');
    document.getElementById('transcript').textContent = '';
    document.getElementById('transcript').classList.remove('tem-texto');
  };

  rec.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const txt = document.getElementById('transcript');
    txt.textContent = final || interim;
    txt.classList.add('tem-texto');
    if (final) processar(final.trim());
  };

  rec.onerror = (e) => {
    setStatus('Erro no microfone: ' + e.error, '');
    pararMic();
  };

  rec.onend = () => {
    if (ouvindo && !processando) pararMic();
  };

  return rec;
}

function toggleMic() {
  if (ouvindo) {
    pararMic();
    return;
  }
  if (!recognition) recognition = inicializarReconhecimento();
  if (!recognition) return;
  try { recognition.start(); } catch(e) { recognition = inicializarReconhecimento(); recognition.start(); }
}

function pararMic() {
  ouvindo = false;
  if (recognition) try { recognition.stop(); } catch(e) {}
  document.getElementById('mic-btn').classList.remove('ouvindo', 'processando');
  document.getElementById('bob-avatar').classList.remove('ouvindo', 'falando');
  if (!processando) setStatus('Clique no BOB ou no microfone para falar', '');
}

// ── Status ────────────────────────────────────────────────────────
function setStatus(txt, cls) {
  const el = document.getElementById('bob-status');
  el.textContent = txt;
  el.className = 'bob-status' + (cls ? ' ' + cls : '');
}

// ── Buscar dados da API do Meta ───────────────────────────────────
async function buscarDadosMeta(preset) {
  if (!token) return null;
  const resultados = [];
  for (const conta of CONTAS) {
    try {
      const url = `https://graph.facebook.com/${API_VERSION}/${conta.id}/insights?fields=spend,impressions,clicks,actions,action_values&date_preset=${preset}&access_token=${token}`;
      const r = await fetch(url);
      const d = await r.json();
      const ins = d.data && d.data[0];
      const gasto = parseFloat(ins?.spend || 0);
      const actions = ins?.actions || [];
      const actionValues = ins?.action_values || [];
      const pedidos = parseInt(actions.find(a => a.action_type === 'purchase')?.value || 0);
      const fat = parseFloat(actionValues.find(a => a.action_type === 'purchase')?.value || 0);
      const cpr = pedidos > 0 ? gasto / pedidos : 0;
      const roas = gasto > 0 && fat > 0 ? fat / gasto : 0;
      resultados.push({ nome: conta.nome, gasto, pedidos, fat, cpr, roas });
    } catch(e) {
      resultados.push({ nome: conta.nome, gasto: 0, pedidos: 0, fat: 0, cpr: 0, roas: 0 });
    }
  }
  return resultados;
}

async function buscarSaldos() {
  if (!token) return null;
  const saldos = [];
  for (const conta of CONTAS) {
    try {
      const url = `https://graph.facebook.com/${API_VERSION}/${conta.id}?fields=name,balance,spend_cap,amount_spent&access_token=${token}`;
      const r = await fetch(url);
      const d = await r.json();
      const sc = parseInt(d.spend_cap || 0) / 100;
      const amt = parseInt(d.amount_spent || 0) / 100;
      const bal = sc > 0 ? sc - amt : parseInt(d.balance || 0) / 100;
      saldos.push({ nome: conta.nome, saldo: bal, spend_cap: sc });
    } catch(e) {
      saldos.push({ nome: conta.nome, saldo: 0, spend_cap: 0 });
    }
  }
  return saldos;
}

async function buscarEncerramentos() {
  if (!token) return null;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const itens = [];
  for (const conta of CONTAS) {
    try {
      const url = `https://graph.facebook.com/${API_VERSION}/${conta.id}/campaigns?fields=name,effective_status,stop_time&limit=50&access_token=${token}`;
      const r = await fetch(url);
      const d = await r.json();
      for (const camp of (d.data || [])) {
        if (camp.stop_time) {
          const dt = new Date(camp.stop_time); dt.setHours(0,0,0,0);
          const dias = Math.round((dt - hoje) / 86400000);
          if (dias >= 0 && dias <= 14) itens.push({ bm: conta.nome, camp: camp.name, dias, status: camp.effective_status });
        }
      }
    } catch(e) {}
  }
  return itens.sort((a,b) => a.dias - b.dias);
}

// ── Processar comando com Claude ──────────────────────────────────
async function processar(texto) {
  if (!texto) return;
  processando = true;
  pararMic();
  setStatus('Processando...', 'processando');
  document.getElementById('mic-btn').classList.add('processando');
  adicionarMensagem('user', texto);
  mostrarLoading();

  // Determinar quais dados buscar baseado no comando
  const cmd = texto.toLowerCase();
  let dadosMeta = null;
  let saldos = null;
  let encerramentos = null;
  let preset = 'last_7d';

  if (cmd.includes('30 dias') || cmd.includes('mes') || cmd.includes('mês')) preset = 'last_30d';
  else if (cmd.includes('14 dias')) preset = 'last_14d';
  else if (cmd.includes('ontem')) preset = 'yesterday';
  else if (cmd.includes('hoje')) preset = 'today';

  setStatus('Buscando dados do Meta...', 'processando');

  if (cmd.includes('saldo') || cmd.includes('recarga') || cmd.includes('dinheiro')) {
    saldos = await buscarSaldos();
  } else if (cmd.includes('encerr') || cmd.includes('venc') || cmd.includes('acabar') || cmd.includes('prazo')) {
    encerramentos = await buscarEncerramentos();
  } else {
    dadosMeta = await buscarDadosMeta(preset);
    if (cmd.includes('saldo')) saldos = await buscarSaldos();
  }

  // Montar contexto para o Claude
  let contexto = `Você é o BOB, assistente de tráfego pago da Monaco Agency. Responda de forma direta, objetiva e em português brasileiro. Use emojis com moderação. Seja conciso mas completo.\n\nComando do usuário: "${texto}"\n\n`;

  if (dadosMeta) {
    const total_gasto = dadosMeta.reduce((s,d) => s+d.gasto, 0);
    const total_ped = dadosMeta.reduce((s,d) => s+d.pedidos, 0);
    const total_fat = dadosMeta.reduce((s,d) => s+d.fat, 0);
    const roas_medio = total_gasto > 0 && total_fat > 0 ? total_fat/total_gasto : 0;
    const cpr_medio = total_ped > 0 ? total_gasto/total_ped : 0;

    contexto += `DADOS DE PERFORMANCE (${preset}):\n`;
    contexto += `Total investido: ${fmt(total_gasto)}\n`;
    contexto += `Total pedidos: ${fmtN(total_ped)}\n`;
    contexto += `Total faturamento: ${fmt(total_fat)}\n`;
    contexto += `ROAS médio: ${roas_medio.toFixed(2)}x\n`;
    contexto += `CPR médio: ${fmt(cpr_medio)}\n\n`;
    contexto += `DETALHES POR BM:\n`;
    dadosMeta.forEach(d => {
      if (d.gasto > 0) contexto += `- ${d.nome}: investido ${fmt(d.gasto)}, ${d.pedidos} pedidos, fat ${fmt(d.fat)}, ROAS ${d.roas.toFixed(2)}x, CPR ${fmt(d.cpr)}\n`;
      else contexto += `- ${d.nome}: sem dados no período\n`;
    });
  }

  if (saldos) {
    contexto += `\nSALDOS DAS CONTAS:\n`;
    saldos.forEach(s => { contexto += `- ${s.nome}: ${fmt(s.saldo)}${s.spend_cap > 0 ? ' (limite: '+fmt(s.spend_cap)+')' : ''}\n`; });
  }

  if (encerramentos) {
    contexto += `\nCAMPANHAS ENCERRANDO (próximos 14 dias):\n`;
    if (encerramentos.length === 0) contexto += 'Nenhuma campanha encerrando nos próximos 14 dias.\n';
    else encerramentos.forEach(e => { contexto += `- ${e.bm} / ${e.camp}: ${e.dias === 0 ? 'HOJE' : 'em '+e.dias+' dias'} (${e.status})\n`; });
  }

  try {
    setStatus('BOB está pensando...', 'processando');
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': anthropicKey, 'anthropic-version': '2023-06-01', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 600,
        messages: [{ role: 'user', content: contexto }]
      })
    });

    if (!r.ok) throw new Error('Erro na API Claude: ' + r.status);
    const data = await r.json();
    const resposta = data.content[0].text.trim();

    removerLoading();
    adicionarMensagem('bob', resposta);
    mostrarResposta(resposta);
    falarResposta(resposta);

  } catch(e) {
    removerLoading();
    const erro = 'Desculpe, ocorreu um erro ao processar sua solicitação. Verifique a chave da API.';
    adicionarMensagem('bob', erro);
    mostrarResposta(erro);
    setStatus('Erro ao processar. Verifique a API Key.', '');
  }

  processando = false;
  document.getElementById('mic-btn').classList.remove('processando');
}

async function executarComando(cmd) {
  document.getElementById('transcript').textContent = cmd;
  document.getElementById('transcript').classList.add('tem-texto');
  await processar(cmd);
}

// ── UI ────────────────────────────────────────────────────────────
function adicionarMensagem(tipo, texto) {
  historico.push({ tipo, texto });
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  const avatar = tipo === 'bob' ? '🤖' : 'VC';
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble">${texto.replace(/\n/g, '<br>')}</div>`;
  document.getElementById('historico-msgs').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function mostrarLoading() {
  const div = document.createElement('div');
  div.className = 'msg bob';
  div.id = 'loading-msg';
  div.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
  document.getElementById('historico-msgs').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function removerLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

function mostrarResposta(txt) {
  const box = document.getElementById('resposta-box');
  document.getElementById('resposta-texto').innerHTML = txt.replace(/\n/g, '<br>');
  box.classList.add('show');
}

// ── Text-to-Speech ────────────────────────────────────────────────
function falarResposta(texto) {
  if (!synth) return;
  synth.cancel();

  // Limpar markdown e emojis para falar mais natural
  const textoLimpo = texto
    .replace(/[🤖📊💰🚨⚠️✅❌🏆📅🛒🔴⏰💪🔥]/g, '')
    .replace(/\*\*/g, '').replace(/\*/g, '')
    .replace(/<br>/g, '. ')
    .replace(/━+/g, '')
    .trim();

  const utterance = new SpeechSynthesisUtterance(textoLimpo);
  utterance.lang = 'pt-BR';
  utterance.rate = 1.05;
  utterance.pitch = 1;

  // Tentar voz pt-BR
  const vozes = synth.getVoices();
  const vozPtBR = vozes.find(v => v.lang === 'pt-BR') || vozes.find(v => v.lang.startsWith('pt'));
  if (vozPtBR) utterance.voice = vozPtBR;

  utterance.onstart = () => {
    setStatus('BOB está falando...', 'falando');
    document.getElementById('bob-avatar').classList.add('falando');
  };

  utterance.onend = () => {
    setStatus('Clique no BOB ou no microfone para falar', '');
    document.getElementById('bob-avatar').classList.remove('falando');
  };

  synth.speak(utterance);
}

// Carregar vozes (necessário em alguns navegadores)
if (synth) {
  synth.onvoiceschanged = () => synth.getVoices();
  synth.getVoices();
}
</script>
</body>
</html>
