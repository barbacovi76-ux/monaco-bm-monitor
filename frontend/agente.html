<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOB Agent — Monaco Agency</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap');

  :root {
    --gold: #f5c518;
    --gold-dim: #b8930e;
    --gold-bg: rgba(245,197,24,.08);
    --gold-bg2: rgba(245,197,24,.04);
    --black: #07080b;
    --s1: #0c0e12;
    --s2: #11141a;
    --s3: #161a22;
    --b1: #1c2030;
    --b2: #232840;
    --text: #d8dce8;
    --dim: #6b7394;
    --muted: #323752;
    --green: #16c784;
    --amber: #f0a500;
    --red: #e84040;
    --blue: #3b82f6;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--black); color: var(--text); min-height: 100vh; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px);
    pointer-events: none; z-index: 9999;
  }

  .hdr {
    background: var(--s1); border-bottom: 1px solid var(--b1);
    padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
    gap: 10px; position: sticky; top: 0; z-index: 100; height: 52px; flex-wrap: wrap;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-box { width: 28px; height: 28px; background: var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 500; color: #000; flex-shrink: 0; }
  .logo-name { font-size: 13px; font-weight: 500; color: #fff; letter-spacing: .3px; }
  .logo-sep { color: var(--muted); margin: 0 2px; }
  .logo-sub { font-size: 12px; color: var(--dim); font-family: var(--mono); }

  .hdr-r { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .psw { display: flex; background: var(--s2); border: 1px solid var(--b1); border-radius: 4px; padding: 2px; gap: 1px; }
  .psw-btn { padding: 4px 10px; font-size: 11px; border: none; background: transparent; color: var(--dim); cursor: pointer; border-radius: 3px; font-family: var(--mono); letter-spacing: .3px; transition: color .12s; }
  .psw-btn:hover { color: var(--text); }
  .psw-btn.on { background: var(--gold); color: #000; font-weight: 500; }

  .dp-wrap { display: none; align-items: center; gap: 6px; background: var(--s2); border: 1px solid var(--b1); border-radius: 4px; padding: 3px 8px; }
  .dp-wrap.show { display: flex; }
  .dp-wrap input[type=date] { background: var(--s3); border: 1px solid var(--b1); border-radius: 3px; padding: 3px 7px; font-size: 11px; color: var(--text); outline: none; font-family: var(--mono); }
  .dp-wrap span { font-size: 11px; color: var(--dim); }
  .dp-wrap .dp-ok { padding: 3px 10px; font-size: 11px; background: var(--gold); color: #000; border: none; border-radius: 3px; cursor: pointer; font-weight: 500; }

  .last-run { font-size: 10px; color: var(--muted); font-family: var(--mono); }

  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border: 1px solid var(--b1); background: var(--s2); color: var(--dim); font-size: 12px; cursor: pointer; border-radius: 4px; text-decoration: none; transition: all .12s; font-family: var(--sans); white-space: nowrap; }
  .btn:hover { border-color: var(--b2); color: var(--text); }
  .btn.gold { border-color: rgba(245,197,24,.4); color: var(--gold); background: var(--gold-bg2); }
  .btn.gold:hover { background: var(--gold-bg); border-color: var(--gold); }
  .btn.primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 500; }
  .btn.primary:hover { background: var(--gold-dim); }
  .btn.danger { border-color: rgba(232,64,64,.4); color: var(--red); background: rgba(232,64,64,.04); }
  .btn.danger:hover { background: rgba(232,64,64,.1); }
  .btn i { font-size: 14px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .wrap { max-width: 1400px; margin: 0 auto; padding: 16px 20px; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .mc { background: var(--s2); border: 1px solid var(--b1); border-radius: 6px; padding: 12px 14px; position: relative; overflow: hidden; transition: border-color .15s; }
  .mc:hover { border-color: var(--b2); }
  .mc::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--gold); opacity: 0; transition: opacity .15s; }
  .mc:hover::after { opacity: 1; }
  .mc-lbl { font-size: 10px; color: var(--dim); letter-spacing: .8px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 8px; }
  .mc-val { font-size: 22px; font-weight: 500; color: #fff; font-family: var(--mono); }
  .mc-val.r { color: var(--red); }
  .mc-val.a { color: var(--amber); }
  .mc-val.g { color: var(--green); }
  .mc-val.b { color: var(--blue); }

  .ctrl { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .srch { display: flex; align-items: center; gap: 6px; background: var(--s2); border: 1px solid var(--b1); border-radius: 4px; padding: 6px 10px; flex: 1; min-width: 180px; transition: border-color .12s; }
  .srch:focus-within { border-color: var(--b2); }
  .srch i { font-size: 14px; color: var(--muted); }
  .srch input { background: transparent; border: none; color: var(--text); font-size: 12px; outline: none; width: 100%; font-family: var(--sans); }
  .srch input::placeholder { color: var(--muted); }
  select { background: var(--s2); border: 1px solid var(--b1); border-radius: 4px; padding: 6px 10px; font-size: 12px; color: var(--dim); cursor: pointer; outline: none; font-family: var(--sans); }
  select:focus { border-color: var(--b2); }

  .sec-hdr { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 8px; display: flex; align-items: center; gap: 8px; font-family: var(--mono); }
  .sec-hdr::after { content: ''; flex: 1; height: 1px; background: var(--b1); }
  .sec-hdr.r { color: var(--red); }
  .sec-hdr.a { color: var(--amber); }
  .sec-hdr.g { color: var(--green); }
  .sec-hdr.b { color: var(--blue); }

  .alert-card {
    background: var(--s2); border: 1px solid var(--b1);
    border-radius: 6px; padding: 14px 16px; margin-bottom: 6px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: border-color .12s;
  }
  .alert-card:hover { border-color: var(--b2); }
  .alert-card.critico { border-left: 2px solid var(--red); }
  .alert-card.atencao { border-left: 2px solid var(--amber); }
  .alert-card.info { border-left: 2px solid var(--blue); }
  .alert-card.ok { border-left: 2px solid var(--green); }

  .alert-icon { font-size: 11px; font-family: var(--mono); font-weight: 500; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
  .critico .alert-icon { background: rgba(232,64,64,.12); color: var(--red); border: 1px solid rgba(232,64,64,.2); }
  .atencao .alert-icon { background: rgba(240,165,0,.12); color: var(--amber); border: 1px solid rgba(240,165,0,.2); }
  .info .alert-icon { background: rgba(59,130,246,.12); color: var(--blue); border: 1px solid rgba(59,130,246,.2); }
  .ok .alert-icon { background: rgba(22,199,132,.12); color: var(--green); border: 1px solid rgba(22,199,132,.2); }

  .alert-content { flex: 1; }
  .alert-bm { font-size: 10px; color: var(--muted); font-family: var(--mono); letter-spacing: .3px; margin-bottom: 3px; }
  .alert-title { font-size: 13px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .alert-desc { font-size: 12px; color: var(--dim); line-height: 1.6; }
  .alert-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .meta-tag { font-size: 10px; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); letter-spacing: .2px; }
  .meta-tag.red { background: rgba(232,64,64,.08); color: var(--red); border: 1px solid rgba(232,64,64,.2); }
  .meta-tag.amber { background: rgba(240,165,0,.08); color: var(--amber); border: 1px solid rgba(240,165,0,.2); }
  .meta-tag.green { background: rgba(22,199,132,.08); color: var(--green); border: 1px solid rgba(22,199,132,.2); }
  .meta-tag.blue { background: rgba(59,130,246,.08); color: var(--blue); border: 1px solid rgba(59,130,246,.2); }
  .meta-tag.purple { background: rgba(167,139,250,.08); color: #a78bfa; border: 1px solid rgba(167,139,250,.2); }

  .prog-bar { height: 2px; background: var(--b1); border-radius: 1px; overflow: hidden; margin-top: 8px; }
  .prog-fill { height: 100%; border-radius: 1px; transition: width .4s; }

  .loading { text-align: center; padding: 52px; color: var(--muted); font-size: 12px; font-family: var(--mono); }
  .spin { display: inline-block; animation: spin 1s linear infinite; color: var(--gold); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 52px; color: var(--muted); font-family: var(--mono); font-size: 12px; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: 4px; font-size: 12px; font-family: var(--mono); z-index: 500; display: none; border: 1px solid; }
  .toast.ok { background: rgba(22,199,132,.1); color: var(--green); border-color: rgba(22,199,132,.3); }
  .toast.err { background: rgba(232,64,64,.1); color: var(--red); border-color: rgba(232,64,64,.3); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--s1); }
  ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-box">B</div>
    <span class="logo-name">Monaco Agency</span>
    <span class="logo-sep">/</span>
    <span class="logo-sub">BOB_AGENT</span>
  </div>
  <div class="hdr-r">
    <div class="psw">
      <button class="psw-btn" onclick="setPeriodo('today',this)">HOJ</button>
      <button class="psw-btn" onclick="setPeriodo('yesterday',this)">ONT</button>
      <button class="psw-btn on" onclick="setPeriodo('last_7d',this)">07D</button>
      <button class="psw-btn" onclick="setPeriodo('last_14d',this)">14D</button>
      <button class="psw-btn" onclick="setPeriodo('last_30d',this)">30D</button>
      <button class="psw-btn" onclick="toggleDP(this)" id="btn-dp">PER</button>
    </div>
    <div class="dp-wrap" id="dp-wrap">
      <input type="date" id="d-ini">
      <span>→</span>
      <input type="date" id="d-fim">
      <button class="dp-ok" onclick="aplicarDP()">OK</button>
    </div>
    <span class="last-run" id="last-run">NUNCA_EXECUTADO</span>
    <button class="btn primary" onclick="rodarAgente()" id="btn-rodar"><i class="ti ti-robot" aria-hidden="true"></i> Rodar BOB</button>
    <button class="btn danger" onclick="enviarAlertas()" id="btn-enviar" style="display:none;"><i class="ti ti-send" aria-hidden="true"></i> Enviar alertas</button>
    <a href="dashboard.html" class="btn"><i class="ti ti-arrow-left" aria-hidden="true"></i> Dashboard</a>
  </div>
</div>

<div class="wrap">

  <div class="metrics">
    <div class="mc"><div class="mc-lbl">Critico</div><div class="mc-val r" id="s-critico">—</div></div>
    <div class="mc"><div class="mc-lbl">Atencao</div><div class="mc-val a" id="s-atencao">—</div></div>
    <div class="mc"><div class="mc-lbl">Informativo</div><div class="mc-val b" id="s-info">—</div></div>
    <div class="mc"><div class="mc-lbl">Saudavel</div><div class="mc-val g" id="s-ok">—</div></div>
    <div class="mc"><div class="mc-lbl">BMs analisadas</div><div class="mc-val" id="s-bms">—</div></div>
    <div class="mc"><div class="mc-lbl">Campanhas</div><div class="mc-val" id="s-camps">—</div></div>
  </div>

  <div class="ctrl">
    <div class="srch">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="busca" placeholder="Filtrar BM ou campanha..." oninput="filtrar()">
    </div>
    <select id="filtro-tipo" onchange="filtrar()">
      <option value="">Todos os alertas</option>
      <option value="critico">Critico</option>
      <option value="atencao">Atencao</option>
      <option value="info">Informativo</option>
      <option value="ok">Saudavel</option>
    </select>
    <select id="filtro-categoria" onchange="filtrar()">
      <option value="">Todas as categorias</option>
      <option value="orcamento">Orcamento</option>
      <option value="performance">Performance</option>
      <option value="criativo">Criativo</option>
      <option value="status">Status</option>
      <option value="prazo">Prazo</option>
    </select>
  </div>

  <div id="alertas-container">
    <div class="empty">Execute BOB para analisar todas as BMs</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN_KEY = 'monaco_meta_token';
const API_VERSION = 'v19.0';
const token = localStorage.getItem(TOKEN_KEY);
const WPP_URL = 'https://evolution-api-production-2227.up.railway.app';
const WPP_KEY = 'monaco123';
const WPP_INSTANCIA = 'teste';
const GRUPO_OPERACOES = '120363403884174816@g.us';

let periodoAgente = 'last_7d';
let agenteDataInicio = '';
let agenteDataFim = '';
let todosAlertas = [];

const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

function setPeriodo(p, el) {
  periodoAgente = p; agenteDataInicio = ''; agenteDataFim = '';
  document.querySelectorAll('.psw-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('dp-wrap').classList.remove('show');
}

function toggleDP(el) {
  const w = document.getElementById('dp-wrap');
  w.classList.toggle('show');
  if (w.classList.contains('show')) {
    el.classList.add('on');
    const h = new Date();
    document.getElementById('d-fim').value = h.toISOString().split('T')[0];
    document.getElementById('d-ini').value = new Date(h - 6*86400000).toISOString().split('T')[0];
  } else { el.classList.remove('on'); }
}

function aplicarDP() {
  const ini = document.getElementById('d-ini').value;
  const fim = document.getElementById('d-fim').value;
  if (!ini || !fim) return;
  periodoAgente = 'custom'; agenteDataInicio = ini; agenteDataFim = fim;
  document.getElementById('dp-wrap').classList.remove('show');
  showToast('PERIODO_SET: ' + ini + ' → ' + fim, 'ok');
}

function buildInsightField(prefix) {
  if (periodoAgente === 'custom' && agenteDataInicio && agenteDataFim) {
    const tr = JSON.stringify({since: agenteDataInicio, until: agenteDataFim});
    return prefix + '.time_range(' + tr + '){spend,impressions,clicks,actions,action_values,cost_per_action_type}';
  }
  return prefix + '.date_preset(' + periodoAgente + '){spend,impressions,clicks,actions,action_values,cost_per_action_type}';
}

const CONTAS_FOOD = [
  { nome: 'CA - ROSA SUL NOVA', id: 'act_2523170184768797' },
  { nome: 'Dia de Pizza - Dourados', id: 'act_723575425785405' },
  { nome: 'IH CAMPO GRANDE MS', id: 'act_1131240581799095' },
  { nome: 'Mollinari Pizzaria', id: 'act_459274303920372' },
  { nome: 'MrGabs', id: 'act_728296823243425' },
  { nome: 'IH DOURADOS', id: 'act_831936562721815' },
  { nome: 'Villa Grano Pizzaria', id: 'act_909424425271250' },
  { nome: 'Brados Pizzaria', id: 'act_972023765779926' },
  { nome: 'Berlim Pizzaria', id: 'act_836447545843342' },
  { nome: 'A FAVORITA', id: 'act_969681458906352' },
  { nome: 'CA - BRAVA PIZZA', id: 'act_4279801688941861' },
  { nome: 'Pavao Lanchonete', id: 'act_1759603645448352' },
  { nome: 'Fornalha Pizzaria', id: 'act_1618084519451450' },
  { nome: 'CA- Leni ADS 02', id: 'act_1569287454130140' },
];

async function fetchCampanhas(accountId) {
  const insField = buildInsightField('insights');
  const fields = [
    'id','name','status','effective_status','objective',
    'lifetime_budget','daily_budget','budget_remaining',
    'start_time','stop_time','created_time',
    insField,
    'ads.limit(50){id,name,status,effective_status,' + buildInsightField('insights') + '}'
  ].join(',');
  const r = await fetch('https://graph.facebook.com/' + API_VERSION + '/' + accountId + '/campaigns?fields=' + encodeURIComponent(fields) + '&limit=50&access_token=' + token);
  return r.json();
}

function analisarCampanha(camp, bmNome, bmId) {
  const alertas = [];
  const hoje = new Date();
  const ins = camp.insights && camp.insights.data && camp.insights.data[0];
  const gasto = parseFloat((ins && ins.spend) || 0);
  const actions = (ins && ins.actions) || [];
  const actionValues = (ins && ins.action_values) || [];
  const pedidos = parseInt((actions.find(a => a.action_type === 'purchase') || {value:0}).value);
  const fat = parseFloat((actionValues.find(a => a.action_type === 'purchase') || {value:0}).value);
  const roas = gasto > 0 && fat > 0 ? fat / gasto : 0;
  const cpr = pedidos > 0 ? gasto / pedidos : 0;
  const lifetimeBudget = parseFloat(camp.lifetime_budget || 0) / 100;
  const dailyBudget = parseFloat(camp.daily_budget || 0) / 100;
  const budgetRemaining = parseFloat(camp.budget_remaining || 0) / 100;
  const status = camp.effective_status || camp.status;
  const ads = (camp.ads && camp.ads.data) || [];
  const adsAtivos = ads.filter(a => a.effective_status === 'ACTIVE' || a.effective_status === 'CAMPAIGN_PAUSED');
  const adsPausados = ads.filter(a => ['PAUSED','ADSET_PAUSED'].includes(a.effective_status));
  const gastoMedioAd = adsAtivos.length > 0 ? gasto / adsAtivos.length : 0;
  let diasRestantes = null, tetoMaxAdSemanal = null, orcamentoSemanalEstimado = null;
  if (camp.stop_time) diasRestantes = Math.ceil((new Date(camp.stop_time) - hoje) / 86400000);
  if (lifetimeBudget > 0) {
    const startDate = camp.start_time ? new Date(camp.start_time) : hoje;
    const stopDate = camp.stop_time ? new Date(camp.stop_time) : null;
    const diasTotais = stopDate ? Math.ceil((stopDate - startDate) / 86400000) : null;
    if (diasTotais && diasTotais > 0) {
      orcamentoSemanalEstimado = (lifetimeBudget / diasTotais) * 7;
      tetoMaxAdSemanal = adsAtivos.length > 0 ? orcamentoSemanalEstimado / adsAtivos.length : 0;
    }
  } else if (dailyBudget > 0) {
    orcamentoSemanalEstimado = dailyBudget * 7;
    tetoMaxAdSemanal = adsAtivos.length > 0 ? orcamentoSemanalEstimado / adsAtivos.length : 0;
  }
  const base = { bmNome, bmId, campNome: camp.name, campId: camp.id, status, gasto, roas, cpr, pedidos, adsAtivos: adsAtivos.length, diasRestantes };

  if (status === 'PAUSED' && gasto > 0) {
    alertas.push({...base, tipo:'atencao', categoria:'status', icon:'PAUSED',
      titulo:'Campanha pausada com historico de gasto',
      desc:'Estava gastando ' + fmt(gasto) + ' no periodo e foi pausada. Verificar intencionalidade.',
      tags:[{txt:'PAUSED',cor:'amber'},{txt:fmt(gasto),cor:'amber'}]
    });
  }
  if ((status === 'CAMPAIGN_PAUSED' || status === 'PAUSED') && gasto === 0) {
    alertas.push({...base, tipo:'info', categoria:'status', icon:'PAUSED',
      titulo:'Campanha pausada sem gasto',
      desc:'Sem gasto no periodo selecionado. Verificar se deve ser reativada ou arquivada.',
      tags:[{txt:'PAUSED',cor:'blue'},{txt:'NO_SPEND',cor:'blue'}]
    });
  }
  if (status === 'ACTIVE') {
    if (gasto > 0 && pedidos === 0) {
      alertas.push({...base, tipo:'critico', categoria:'performance', icon:'CRIT',
        titulo:'Gasto sem retorno — zero compras',
        desc:'Investiu ' + fmt(gasto) + ' sem nenhuma compra registrada. Revisao urgente necessaria.',
        tags:[{txt:fmt(gasto)+' gasto',cor:'red'},{txt:'0_PEDIDOS',cor:'red'},{txt:'ACTIVE',cor:'red'}],
        progresso:{val:0,max:100,cor:'#e84040'}
      });
    } else if (gasto > 0 && roas < 1.5 && pedidos > 0) {
      alertas.push({...base, tipo:'critico', categoria:'performance', icon:'CRIT',
        titulo:'ROAS critico — abaixo do minimo',
        desc:'ROAS ' + roas.toFixed(2) + 'x. Para cada R$1 investido retorna R$' + roas.toFixed(2) + '. Revisar criativos.',
        tags:[{txt:'ROAS_'+roas.toFixed(2)+'x',cor:'red'},{txt:'CPR_'+fmt(cpr),cor:'red'}],
        progresso:{val:Math.min(roas*20,100),max:100,cor:'#e84040'}
      });
    } else if (gasto > 0 && roas >= 1.5 && roas < 3) {
      alertas.push({...base, tipo:'atencao', categoria:'performance', icon:'WARN',
        titulo:'ROAS abaixo do target (meta: 3x+)',
        desc:'ROAS ' + roas.toFixed(2) + 'x. Retornando mas abaixo do esperado. Verificar criativos e publico.',
        tags:[{txt:'ROAS_'+roas.toFixed(2)+'x',cor:'amber'},{txt:'CPR_'+fmt(cpr),cor:'amber'}],
        progresso:{val:Math.min(roas*20,100),max:100,cor:'#f0a500'}
      });
    } else if (gasto > 0 && roas >= 3) {
      alertas.push({...base, tipo:'ok', categoria:'performance', icon:'OK',
        titulo:'Performance dentro do target',
        desc:'ROAS ' + roas.toFixed(2) + 'x com ' + pedidos + ' pedidos e ' + fmt(fat) + ' em faturamento.',
        tags:[{txt:'ROAS_'+roas.toFixed(2)+'x',cor:'green'},{txt:pedidos+'_ped',cor:'green'},{txt:fmt(fat),cor:'green'}],
        progresso:{val:Math.min(roas*10,100),max:100,cor:'#16c784'}
      });
    }
    if (lifetimeBudget > 0 && budgetRemaining > 0) {
      const pct = ((lifetimeBudget - budgetRemaining) / lifetimeBudget) * 100;
      if (pct > 90) {
        alertas.push({...base, tipo:'critico', categoria:'orcamento', icon:'CRIT',
          titulo:'Orcamento ' + pct.toFixed(0) + '% consumido',
          desc:'Restam ' + fmt(budgetRemaining) + ' de ' + fmt(lifetimeBudget) + '. Campanha pode pausar em breve.',
          tags:[{txt:fmt(budgetRemaining)+'_restante',cor:'red'},{txt:pct.toFixed(0)+'%_gasto',cor:'red'}].concat(diasRestantes!==null&&diasRestantes>=0?[{txt:'D+'+diasRestantes,cor:'red'}]:[]),
          progresso:{val:pct,max:100,cor:'#e84040'}
        });
      } else if (pct > 70) {
        alertas.push({...base, tipo:'atencao', categoria:'orcamento', icon:'WARN',
          titulo:'Orcamento ' + pct.toFixed(0) + '% consumido',
          desc:'Restam ' + fmt(budgetRemaining) + ' de ' + fmt(lifetimeBudget) + '.',
          tags:[{txt:fmt(budgetRemaining)+'_restante',cor:'amber'},{txt:pct.toFixed(0)+'%_gasto',cor:'amber'}].concat(diasRestantes!==null&&diasRestantes>=0?[{txt:'D+'+diasRestantes,cor:'amber'}]:[]),
          progresso:{val:pct,max:100,cor:'#f0a500'}
        });
      }
      if (tetoMaxAdSemanal > 0 && gastoMedioAd > 0) {
        const pctTeto = (gastoMedioAd / tetoMaxAdSemanal) * 100;
        if (pctTeto > 120) {
          alertas.push({...base, tipo:'atencao', categoria:'criativo', icon:'WARN',
            titulo:'Criativo acima do teto de gasto (' + pctTeto.toFixed(0) + '%)',
            desc:'Media ' + fmt(gastoMedioAd) + '/sem por anuncio. Teto calculado: ' + fmt(tetoMaxAdSemanal) + '/sem.',
            tags:[{txt:fmt(gastoMedioAd)+'/ad',cor:'amber'},{txt:'TETO_'+fmt(tetoMaxAdSemanal),cor:'blue'},{txt:adsAtivos.length+'_ads',cor:'blue'}]
          });
        }
      }
    }
    if (diasRestantes !== null) {
      if (diasRestantes <= 2 && diasRestantes > 0) {
        alertas.push({...base, tipo:'critico', categoria:'prazo', icon:'CRIT',
          titulo:'Encerra em ' + diasRestantes + ' dia(s)',
          desc:'Campanha prestes a encerrar. Verificar renovacao.',
          tags:[{txt:'D+'+diasRestantes,cor:'red'},{txt:'ENCERRANDO',cor:'red'}], diasRestantes
        });
      } else if (diasRestantes <= 7 && diasRestantes > 2) {
        alertas.push({...base, tipo:'atencao', categoria:'prazo', icon:'WARN',
          titulo:'Encerra em ' + diasRestantes + ' dias',
          desc:'Planejar renovacao antes do encerramento.',
          tags:[{txt:'D+'+diasRestantes,cor:'amber'}], diasRestantes
        });
      }
    }
    if (adsAtivos.length === 0 && gasto === 0) {
      alertas.push({...base, tipo:'atencao', categoria:'criativo', icon:'WARN',
        titulo:'Zero anuncios ativos',
        desc:'Campanha ativa sem anuncios rodando. Verificar conjuntos e criativos.',
        tags:[{txt:'0_ADS_ATIVOS',cor:'amber'},{txt:adsPausados.length+'_pausados',cor:'blue'}]
      });
    }
    if (adsAtivos.length >= 5) {
      alertas.push({...base, tipo:'info', categoria:'criativo', icon:'INFO',
        titulo:adsAtivos.length + ' anuncios ativos — orcamento fragmentado',
        desc:'Teto estimado por anuncio: ' + (tetoMaxAdSemanal > 0 ? fmt(tetoMaxAdSemanal)+'/sem' : 'N/A') + '.',
        tags:[{txt:adsAtivos.length+'_ads',cor:'blue'}].concat(tetoMaxAdSemanal>0?[{txt:'TETO_'+fmt(tetoMaxAdSemanal),cor:'purple'}]:[])
      });
    }
  }
  if (['CAMPAIGN_PAUSED','PAUSED'].includes(status) && !camp.start_time) {
    alertas.push({...base, tipo:'info', categoria:'status', icon:'INFO',
      titulo:'Campanha nao iniciada / rascunho',
      desc:'Criada mas nao publicada. Verificar se deve ser ativada.',
      tags:[{txt:'DRAFT',cor:'blue'}]
    });
  }
  return alertas;
}

async function rodarAgente() {
  if (!token) { alert('TOKEN_AUSENTE. Salve o token no dashboard.'); return; }
  const btn = document.getElementById('btn-rodar');
  btn.innerHTML = '<i class="ti ti-loader-2 spin" aria-hidden="true"></i> Analisando...';
  btn.disabled = true;
  const periodLabel = periodoAgente === 'custom' ? (agenteDataInicio + ' → ' + agenteDataFim) : periodoAgente;
  document.getElementById('alertas-container').innerHTML = '<div class="loading"><span class="spin">◌</span> Iniciando scan de ' + CONTAS_FOOD.length + ' BMs...</div>';
  todosAlertas = [];
  let totalCamps = 0, bmsAnalisadas = 0;
  for (const conta of CONTAS_FOOD) {
    try {
      const res = await fetchCampanhas(conta.id);
      const campanhas = res.data || [];
      totalCamps += campanhas.length;
      bmsAnalisadas++;
      for (const camp of campanhas) todosAlertas.push(...analisarCampanha(camp, conta.nome, conta.id));
      document.getElementById('alertas-container').innerHTML = '<div class="loading"><span class="spin">◌</span> SCAN ' + bmsAnalisadas + '/' + CONTAS_FOOD.length + ' BMs — ' + totalCamps + ' campanhas verificadas</div>';
    } catch(e) { console.error(conta.nome, e); }
  }
  const criticos = todosAlertas.filter(a => a.tipo === 'critico').length;
  const atencao = todosAlertas.filter(a => a.tipo === 'atencao').length;
  const info = todosAlertas.filter(a => a.tipo === 'info').length;
  const ok = todosAlertas.filter(a => a.tipo === 'ok').length;
  document.getElementById('s-critico').textContent = criticos;
  document.getElementById('s-atencao').textContent = atencao;
  document.getElementById('s-info').textContent = info;
  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-bms').textContent = bmsAnalisadas;
  document.getElementById('s-camps').textContent = totalCamps;
  const agora = new Date().toLocaleString('pt-BR');
  document.getElementById('last-run').textContent = 'LAST_RUN: ' + agora + ' | ' + periodLabel;
  localStorage.setItem('agente_last_run', agora);
  localStorage.setItem('agente_alertas', JSON.stringify(todosAlertas));
  btn.innerHTML = '<i class="ti ti-robot" aria-hidden="true"></i> Rodar BOB';
  btn.disabled = false;
  document.getElementById('btn-enviar').style.display = criticos + atencao > 0 ? 'inline-flex' : 'none';
  filtrar();
}

function filtrar() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const filtroTipo = document.getElementById('filtro-tipo').value;
  const filtroCategoria = document.getElementById('filtro-categoria').value;
  let dados = todosAlertas.filter(a => {
    return (!busca || a.bmNome.toLowerCase().includes(busca) || a.campNome.toLowerCase().includes(busca)) &&
      (!filtroTipo || a.tipo === filtroTipo) &&
      (!filtroCategoria || a.categoria === filtroCategoria);
  });
  const ordem = {critico:0,atencao:1,info:2,ok:3};
  dados.sort((a,b) => (ordem[a.tipo]||0) - (ordem[b.tipo]||0));
  if (!dados.length) {
    document.getElementById('alertas-container').innerHTML = '<div class="empty">NO_RESULTS: nenhum alerta para os filtros selecionados</div>';
    return;
  }
  const grupos = {critico:[],atencao:[],info:[],ok:[]};
  dados.forEach(a => { if (grupos[a.tipo]) grupos[a.tipo].push(a); });
  const tipoLabel = {
    critico:['r','CRITICO — acao imediata'],
    atencao:['a','ATENCAO — verificar em breve'],
    info:['b','INFORMATIVO'],
    ok:['g','SAUDAVEL']
  };
  let html = '';
  for (const tipo of ['critico','atencao','info','ok']) {
    const lista = grupos[tipo];
    if (!lista.length) continue;
    const [cls, lbl] = tipoLabel[tipo];
    html += '<div class="sec-hdr ' + cls + '">' + lbl + ' <span style="opacity:.5;">(' + lista.length + ')</span></div>';
    html += lista.map(a =>
      '<div class="alert-card ' + a.tipo + '">' +
      '<div class="alert-icon">' + a.icon + '</div>' +
      '<div class="alert-content">' +
      '<div class="alert-bm">BM: ' + a.bmNome + '</div>' +
      '<div class="alert-title">' + a.campNome + '</div>' +
      '<div class="alert-desc">' + a.desc + '</div>' +
      '<div class="alert-meta">' +
      (a.tags||[]).map(t => '<span class="meta-tag ' + t.cor + '">' + t.txt + '</span>').join('') +
      (a.adsAtivos > 0 ? '<span class="meta-tag blue">' + a.adsAtivos + '_ads</span>' : '') +
      '</div>' +
      (a.diasRestantes !== null && a.diasRestantes !== undefined && a.diasRestantes >= 0 ? '<div style="font-size:10px;color:' + (a.diasRestantes<=2?'#e84040':a.diasRestantes<=7?'#f0a500':'#6b7394') + ';margin-top:6px;font-family:var(--mono);">ENCERRA_D+' + a.diasRestantes + '</div>' : '') +
      (a.progresso ? '<div class="prog-bar"><div class="prog-fill" style="width:' + Math.min(a.progresso.val,100) + '%;background:' + a.progresso.cor + ';"></div></div>' : '') +
      '</div></div>'
    ).join('');
  }
  document.getElementById('alertas-container').innerHTML = html;
}

function showToast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + tipo; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

async function enviarAlertas() {
  const criticos = todosAlertas.filter(a => a.tipo === 'critico');
  const atencao = todosAlertas.filter(a => a.tipo === 'atencao');
  if (!criticos.length && !atencao.length) { alert('Nenhum alerta para enviar.'); return; }
  const agora = new Date().toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  let linhas = ['BOB Agent — Monaco Agency | ' + agora, ''];
  if (criticos.length) {
    linhas.push('CRITICO (' + criticos.length + ')');
    criticos.forEach(a => { linhas.push('  ' + a.bmNome + ' / ' + a.campNome); linhas.push('  ' + a.desc); if (a.diasRestantes!==null&&a.diasRestantes!==undefined) linhas.push('  ENCERRA_D+' + a.diasRestantes); linhas.push(''); });
  }
  if (atencao.length) {
    linhas.push('ATENCAO (' + atencao.length + ')');
    atencao.forEach(a => { linhas.push('  ' + a.bmNome + ' / ' + a.campNome); linhas.push('  ' + a.desc); if (a.diasRestantes!==null&&a.diasRestantes!==undefined) linhas.push('  ENCERRA_D+' + a.diasRestantes); linhas.push(''); });
  }
  linhas.push('TOTAL: ' + criticos.length + ' critico(s) | ' + atencao.length + ' atencao');
  const btn = document.getElementById('btn-enviar');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const r = await fetch(WPP_URL + '/message/sendText/' + WPP_INSTANCIA, {
      method:'POST', headers:{'apikey':WPP_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({number:GRUPO_OPERACOES,textMessage:{text:linhas.join('\n')}})
    });
    if (r.ok) { btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Enviado'; showToast('SEND_OK: alertas enviados', 'ok'); setTimeout(()=>{btn.innerHTML='<i class="ti ti-send" aria-hidden="true"></i> Enviar alertas';btn.disabled=false;},3000); }
    else throw new Error();
  } catch(e) { btn.innerHTML='<i class="ti ti-send" aria-hidden="true"></i> Enviar alertas'; btn.disabled=false; showToast('SEND_ERR: falha ao enviar','err'); }
}

const savedAlertas = localStorage.getItem('agente_alertas');
const savedLastRun = localStorage.getItem('agente_last_run');
if (savedAlertas && savedLastRun) {
  todosAlertas = JSON.parse(savedAlertas);
  document.getElementById('last-run').textContent = 'LAST_RUN: ' + savedLastRun;
  const c = todosAlertas.filter(a=>a.tipo==='critico').length;
  const at = todosAlertas.filter(a=>a.tipo==='atencao').length;
  document.getElementById('s-critico').textContent = c;
  document.getElementById('s-atencao').textContent = at;
  document.getElementById('s-info').textContent = todosAlertas.filter(a=>a.tipo==='info').length;
  document.getElementById('s-ok').textContent = todosAlertas.filter(a=>a.tipo==='ok').length;
  document.getElementById('s-bms').textContent = new Set(todosAlertas.map(a=>a.bmId)).size;
  document.getElementById('btn-enviar').style.display = (c+at)>0?'inline-flex':'none';
  filtrar();
}
